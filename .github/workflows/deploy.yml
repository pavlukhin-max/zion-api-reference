# Деплой статического API reference сайта на Cloudflare Pages.
# Target subdomain: reference-v2.zionpayment.com (привязка через CF dashboard).
#
# Project в CF Pages: zion-api-reference (preview URL zion-api-reference.pages.dev).
# CLOUDFLARE_ACCOUNT_ID — публичный идентификатор, хранится здесь (не secret).
# CLOUDFLARE_API_TOKEN — в GH secrets (см. Settings → Secrets and variables → Actions).

name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: 4a9a09bd856895194e22f80eeddc12e3
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy . --project-name=zion-api-reference --branch=main
