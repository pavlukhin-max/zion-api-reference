# Деплой статического API reference сайта на Cloudflare Pages.
# Target subdomain: reference-v2.zionpayment.com (привязка через CF dashboard).
#
# Project в CF Pages: zion-api-reference (preview URL zion-api-reference.pages.dev).
# accountId — публичный идентификатор, хранится прямо в workflow (не secret).
# CLOUDFLARE_API_TOKEN — в GH secrets (см. Settings → Secrets and variables → Actions).

name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 4a9a09bd856895194e22f80eeddc12e3
          wranglerVersion: "4"
          command: pages deploy . --project-name=zion-api-reference --branch=main
