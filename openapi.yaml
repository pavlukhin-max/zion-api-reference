          description: Платит ли клиент сетевую комиссию.
          example: false
        commission_paid_by_user:
          type: boolean
          description: Платит ли клиент комиссию Zion.
          example: false
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Дата и время создания (ISO 8601).
          example: "2026-05-25T10:00:00.000Z"
        modified_at:
          type: string
          format: date-time
          readOnly: true
          description: Дата и время последнего изменения (ISO 8601).
          example: "2026-05-25T10:00:00.000Z"
