      summary: Список фиат-платежей
      description: >
        Возвращает список фиат-платежей магазина. Фиат-платёж — это on-ramp операция:
        клиент платит картой/банком (USD/EUR/RUB), Zion через Changelly конвертирует
        и зачисляет криптовалюту на счёт мерчанта.
      operationId: listFiatPayments
      parameters:
        - $ref: '#/components/parameters/ShopIdPath'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
        - $ref: '#/components/parameters/OrderingParam'
        - $ref: '#/components/parameters/CreatedAtAfter'
        - $ref: '#/components/parameters/CreatedAtBefore'
      responses:
        '200':
          description: Список фиат-платежей успешно получен.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedFiatPayments'
              example:
                count: 1
                next: null
                previous: null
                results:
                  - id: "b337b3ac-fa5c-4eea-99b6-f502aeb459c8"
                    shop: "feff876c-aaa5-4c65-9483-75498deabe28"
                    reference: "183a633938"
                    currency: "USD"
                    amount: "100.000000"
                    destination_currency: "USDTTRC20"
                    status: "PENDING"
                    provider: "Changelly"
                    country: "US"
                    payment_method: "card"
                    external_order_id: null
                    external_redirect_url: null
                    created_at: "2026-05-25T10:00:00.000Z"
                    modified_at: "2026-05-25T10:00:00.000Z"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    post:
      tags:
        - Fiat Payments
      summary: Создать фиат-платёж
      description: >
        Инициирует новый фиат-платёж. После создания необходимо вызвать
        `POST /fiat-payments/{id}/pay/` (PUBLIC API) для создания ордера у Changelly
        и получения ссылки на редирект для клиента.
      operationId: createFiatPayment
      parameters:
        - $ref: '#/components/parameters/ShopIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FiatPaymentCreateRequest'
            example:
              currency: "USD"
              amount: "100.000000"
              destination_currency: "USDTTRC20"
              country: "US"
      responses:
        '201':
          description: Фиат-платёж успешно создан.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FiatPayment'
              example:
                id: "b337b3ac-fa5c-4eea-99b6-f502aeb459c8"
                shop: "feff876c-aaa5-4c65-9483-75498deabe28"
                reference: "183a633938"
                currency: "USD"
                amount: "100.000000"
                destination_currency: "USDTTRC20"
                status: "PENDING"
                provider: null
                country: "US"
                payment_method: null
                external_order_id: null
                external_redirect_url: null
                created_at: "2026-05-25T10:00:00.000Z"
                modified_at: "2026-05-25T10:00:00.000Z"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
