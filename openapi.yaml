          format: uri
          nullable: true
          description: URL редиректа при отмене.
          example: null
        success_url:
          type: string
          format: uri
          nullable: true
          description: URL редиректа при успешной оплате.
          example: null
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: Дата и время истечения срока ожидания платежа (ISO 8601).
          example: "2026-05-25T11:00:00.000Z"
        created_at:
