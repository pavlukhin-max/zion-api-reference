      description: >
        Создаёт новый Bearer-токен для программной интеграции с магазином.
        Поле `key` возвращается **только в этом ответе** — сохраните его.
        При повторном запросе получить значение `key` невозможно.
      operationId: createShopToken
      parameters:
        - $ref: '#/components/parameters/ShopIdPath'
