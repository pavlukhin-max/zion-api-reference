  # ─── Payments ────────────────────────────────────────────────────────────────

  /api/v1/shops/{shop_id}/payments/:
    get:
      tags:
        - Payments
      summary: Список платежей
      description: >
        Возвращает список крипто-платежей магазина с поддержкой пагинации,
        фильтрации и сортировки. Платёж создаётся автоматически при переходе
        клиента по ссылке оплаты (invoice, donation, POS) или через API мерчанта.
        Фильтры: `reference`, `wallet__address`, `order_id`,
        `transactions__transaction_hash`, `status`, `currency__name`,
        `fixed_rate`, `fee_paid_by_user`, `created_at`, `modified_at`.
      operationId: listPayments
      parameters:
        - $ref: '#/components/parameters/ShopIdPath'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
        - $ref: '#/components/parameters/OrderingParam'
        - $ref: '#/components/parameters/CreatedAtAfter'
        - $ref: '#/components/parameters/CreatedAtBefore'
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - PENDING
              - CONFIRMING
              - COMPLETED
              - EXPIRED
              - UNDERPAID
              - OVERPAID
              - MULTIPLE
              - DELAYED
              - REJECTED
              - RESOLVED
          description: Фильтр по статусу платежа.
          example: "PENDING"
        - name: currency__name
          in: query
          required: false
          schema:
            type: string
          description: Фильтр по коду валюты (например USDTTRC20).
          example: "USDTTRC20"
        - name: reference
          in: query
          required: false
          schema:
            type: string
          description: Фильтр по reference платежа.
          example: "183a633938"
        - name: order_id
          in: query
          required: false
          schema:
            type: string
          description: Фильтр по order_id мерчанта.
          example: "order-2026-001"
        - name: wallet__address
          in: query
          required: false
          schema:
            type: string
          description: Фильтр по адресу депозитного кошелька.
          example: "TQrY8tryqsYVCYS3MFbtffiPp2ccyn4STm"
      responses:
        '200':
          description: Список платежей успешно получен.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPayments'
              example:
                count: 1
                next: null
                previous: null
                results:
                  - id: "9ada8297-5ac9-4810-a184-3de37f617677"
                    shop: "feff876c-aaa5-4c65-9483-75498deabe28"
                    reference: "183a633938"
                    order_id: null
                    order_description: null
                    currency: "USDTTRC20"
                    amount: "10.000000"
                    received_amount: "0.000000"
                    outcome_amount: "0.000000"
                    address: "TQrY8tryqsYVCYS3MFbtffiPp2ccyn4STm"
                    status: "PENDING"
                    type: "INVOICE_PAYMENT"
                    fixed_rate: true
                    fee_paid_by_user: true
                    commission_paid_by_user: true
                    rate: null
                    fee: "7.007354"
                    commission: "0.100000"
                    preliminary_model: "INVOICE"
                    preliminary_reference: "e477b48c41"
                    invoice_amount: "10.000000"
                    deposit_hash: null
                    deposit_block_date: null
                    cancel_url: null
                    success_url: null
                    expires_at: "2026-05-25T11:00:00.000Z"
                    created_at: "2026-05-25T10:00:00.000Z"
                    modified_at: "2026-05-25T10:00:00.000Z"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'

