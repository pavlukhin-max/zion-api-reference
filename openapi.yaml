openapi: 3.1.0

info:
  title: Zion Crypto payment gateway
  version: "1.0.0"
  description: |
    Zion — криптоплатёжный шлюз с поддержкой USDT (TRC-20, ERC-20) и других
    криптовалют. Предназначен для мерчантов, которым нужно принимать
    крипто-платежи, создавать инвойсы, управлять подписками и делать выводы
    средств. Все операции работают через REST API с JSON-телом.

    ## Авторизация

    Чтобы получить API-ключ, зарегистрируйтесь на https://zionpayment.com и
    сгенерируйте ключ в дашборде в разделе настроек магазина. Передавайте его
    в заголовке `Authorization: Token <ваш-api-key>` (именно с префиксом
    `Token`, а не `Bearer`).

    ```
    curl -H "Authorization: Token <your-api-key>" \
         -H "Content-Type: application/json" \
         https://api.zionpayment.com/api/v1/shops/
    ```

    ## Вебхуки

    Zion отправляет webhook на ваш Callback URL (настраивается в дашборде)
    при изменении статусов платежей и выводов. Подпись передаётся в заголовке
    `X-Signature` (HMAC SHA-1 от raw body, hex). Секрет — `Hook.secret` из
    настроек магазина.

  contact:
    name: Zion Payment
    url: https://zionpayment.com
  license:
    name: Proprietary
    url: https://zionpayment.com

servers:
  - url: https://api.zionpayment.com
    description: Production

tags:
  - name: Authentication
    description: Информация об авторизации и получении API-ключа.
  - name: Shops
    description: Управление магазинами мерчанта.
  - name: Invoices
    description: Создание и управление инвойсами (счетами на оплату).
  - name: Donation Links
    description: Ссылки для приёма донатов с произвольной суммой.
  - name: POS Links
    description: POS-ссылки для оплаты в точке продажи.
  - name: Subscriptions
    description: Управление подписками и периодическими платежами.
  - name: Payments
    description: Крипто-платежи — создание, статусы, управление.
  - name: Fiat Payments
    description: Платежи в фиатной валюте (карта, банк).
  - name: Withdrawals
    description: Выводы средств — обычные, с OTP, affiliate, массовые.
  - name: Conversions
    description: Конвертация между криптовалютами.
  - name: Members
    description: Управление участниками (сотрудниками) магазина.
  - name: Tokens
    description: API-токены магазина — создание, отзыв.
  - name: Wallets & IPs
    description: Кошельки для авто-выплат и белые списки IP-адресов.
  - name: Affiliate
    description: Реферальные ссылки, депозиты и статистика партнёрской программы.
  - name: Analytics
    description: Ежедневная и ежемесячная статистика депозитов.
  - name: Webhooks (incoming)
    description: Исходящие события Zion — доставляются на ваш Callback URL.
  - name: Health
    description: Проверка работоспособности сервиса.

x-tagGroups:
  - name: Getting started
    tags:
      - Authentication
      - Health
  - name: Commerce
    tags:
      - Shops
      - Invoices
      - Donation Links
      - POS Links
      - Subscriptions
      - Payments
      - Fiat Payments
  - name: Money out
    tags:
      - Withdrawals
      - Conversions
  - name: Configuration
    tags:
      - Members
      - Tokens
      - Wallets & IPs
  - name: Analytics
    tags:
      - Affiliate
      - Analytics
  - name: Realtime
    tags:
      - Webhooks (incoming)

security:
  - TokenAuth: []

paths:
  /health:
    get:
      tags:
        - Health
      summary: Проверка работоспособности
      description: Проверка работоспособности сервиса.
      operationId: getHealth
      security: []
      responses:
        '200':
          description: Сервис работает нормально.
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - timestamp
                properties:
                  status:
                    type: string
                    enum:
                      - ok
                    example: ok
                  timestamp:
                    type: string
                    format: date-time
                    example: "2026-05-25T12:00:00Z"
              example:
                status: ok
                timestamp: "2026-05-25T12:00:00Z"

  /api/v1/shops/:
    get:
      tags:
        - Shops
      summary: Список магазинов
      description: >
        Возвращает список магазинов, доступных текущему пользователю.
        Поддерживает пагинацию (limit/offset) и сортировку.
      operationId: listShops
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
        - $ref: '#/components/parameters/OrderingParam'
      responses:
        '200':
          description: Список магазинов успешно получен.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedShops'
              example:
                count: 2
                next: null
                previous: null
                results:
                  - id: "feff876c-aaa5-4c65-9483-75498deabe28"
                    name: "My Crypto Shop"
                    active: true
                    mock: false
                    webhook_url: "https://example.com/webhooks/zion"
                    hmac_secret: "1e4b6d020d81cc5749a9e370a946c0ef"
                    website_link: "https://example.com"
                    cancel_url: "https://example.com/payment/cancel"
                    success_url: "https://example.com/payment/success"
                    commission_rate: "0.0100"
                    underpaid_threshold: "0.00"
                    overpaid_threshold: "0.00"
                    auto_convert: false
                    auto_convert_currency_id: null
                    auto_withdraw: false
                    other_enabled: true
                    popular_enabled: true
                    stable_enabled: true
                    created_at: "2023-12-20T11:03:20.888Z"
                    modified_at: "2023-12-20T11:03:20.892Z"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    post:
      tags:
        - Shops
      summary: Создать магазин
      description: >
        Создаёт новый магазин для текущего пользователя.
        После создания необходимо настроить `webhook_url` для получения уведомлений
        о платежах.
      operationId: createShop
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  description: Название магазина.
                  example: "My New Shop"
                webhook_url:
                  type: string
                  format: uri
                  nullable: true
                  description: URL для вебхуков Zion.
                  example: "https://example.com/webhooks/zion"
                website_link:
                  type: string
                  format: uri
                  nullable: true
                  example: "https://example.com"
                cancel_url:
                  type: string
                  format: uri
                  nullable: true
                  example: "https://example.com/payment/cancel"
                success_url:
                  type: string
                  format: uri
                  nullable: true
                  example: "https://example.com/payment/success"
                underpaid_threshold:
                  type: string
                  pattern: "^[0-9]+\\.[0-9]+$"
                  example: "0.00"
                overpaid_threshold:
                  type: string
                  pattern: "^[0-9]+\\.[0-9]+$"
                  example: "0.00"
                auto_convert:
                  type: boolean
                  example: false
                auto_convert_currency_id:
                  type: string
                  format: uuid
                  nullable: true
                  example: null
                auto_withdraw:
                  type: boolean
                  example: false
                other_enabled:
                  type: boolean
                  example: true
                popular_enabled:
                  type: boolean
                  example: true
                stable_enabled:
                  type: boolean
                  example: true
            example:
              name: "My New Shop"
              webhook_url: "https://example.com/webhooks/zion"
              website_link: "https://example.com"
              cancel_url: "https://example.com/payment/cancel"
              success_url: "https://example.com/payment/success"
              underpaid_threshold: "0.00"
              overpaid_threshold: "0.00"
              auto_convert: false
              auto_withdraw: false
              other_enabled: true
              popular_enabled: true
              stable_enabled: true
      responses:
        '201':
          description: Магазин успешно создан.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shop'
              example:
                id: "feff876c-aaa5-4c65-9483-75498deabe28"
                name: "My New Shop"
                active: true
                mock: false
                webhook_url: "https://example.com/webhooks/zion"
                hmac_secret: "1e4b6d020d81cc5749a9e370a946c0ef"
                website_link: "https://example.com"
                cancel_url: "https://example.com/payment/cancel"
                success_url: "https://example.com/payment/success"
                commission_rate: "0.0100"
                underpaid_threshold: "0.00"
                overpaid_threshold: "0.00"
                auto_convert: false
                auto_convert_currency_id: null
                auto_withdraw: false
                other_enabled: true
                popular_enabled: true
                stable_enabled: true
                created_at: "2026-05-25T10:00:00.000Z"
                modified_at: "2026-05-25T10:00:00.000Z"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/v1/shops/{shop_id}/:
    get:
      tags:
        - Shops
      summary: Получить магазин
      description: Возвращает детали конкретного магазина по его ID.
      operationId: getShop
      parameters:
        - $ref: '#/components/parameters/ShopIdPath'
      responses:
        '200':
          description: Детали магазина.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shop'
              example:
                id: "feff876c-aaa5-4c65-9483-75498deabe28"
                name: "My Crypto Shop"
                active: true
                mock: false
                webhook_url: "https://example.com/webhooks/zion"
                hmac_secret: "1e4b6d020d81cc5749a9e370a946c0ef"
                website_link: "https://example.com"
                cancel_url: "https://example.com/payment/cancel"
                success_url: "https://example.com/payment/success"
                commission_rate: "0.0100"
                underpaid_threshold: "0.00"
                overpaid_threshold: "0.00"
                auto_convert: false
                auto_convert_currency_id: null
                auto_withdraw: false
                other_enabled: true
                popular_enabled: true
                stable_enabled: true
                created_at: "2023-12-20T11:03:20.888Z"
                modified_at: "2023-12-20T11:03:20.892Z"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    patch:
      tags:
        - Shops
      summary: Обновить магазин
      description: >
        Частично обновляет настройки магазина. Все поля опциональны.
        Поля `id`, `active`, `mock`, `hmac_secret`, `commission_rate`, `created_at`, `modified_at`
        доступны только для чтения и не принимаются в теле запроса.
      operationId: updateShop
      parameters:
        - $ref: '#/components/parameters/ShopIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: "Updated Shop Name"
                webhook_url:
                  type: string
                  format: uri
                  nullable: true
                  example: "https://example.com/webhooks/zion"
                website_link:
                  type: string
                  format: uri
                  nullable: true
                  example: "https://example.com"
                cancel_url:
                  type: string
                  format: uri
                  nullable: true
                  example: "https://example.com/payment/cancel"
                success_url:
                  type: string
                  format: uri
                  nullable: true
                  example: "https://example.com/payment/success"
                underpaid_threshold:
                  type: string
                  pattern: "^[0-9]+\\.[0-9]+$"
                  example: "0.05"
                overpaid_threshold:
                  type: string
                  pattern: "^[0-9]+\\.[0-9]+$"
                  example: "0.00"
                auto_convert:
                  type: boolean
                  example: false
                auto_convert_currency_id:
                  type: string
                  format: uuid
                  nullable: true
                  example: null
                auto_withdraw:
                  type: boolean
                  example: false
                other_enabled:
                  type: boolean
                  example: true
                popular_enabled:
                  type: boolean
                  example: true
                stable_enabled:
                  type: boolean
                  example: true
            example:
              webhook_url: "https://example.com/webhooks/zion-v2"
              underpaid_threshold: "0.05"
      responses:
        '200':
          description: Магазин успешно обновлён.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shop'
              example:
                id: "feff876c-aaa5-4c65-9483-75498deabe28"
                name: "My Crypto Shop"
                active: true
                mock: false
                webhook_url: "https://example.com/webhooks/zion-v2"
                hmac_secret: "1e4b6d020d81cc5749a9e370a946c0ef"
                website_link: "https://example.com"
                cancel_url: "https://example.com/payment/cancel"
                success_url: "https://example.com/payment/success"
                commission_rate: "0.0100"
                underpaid_threshold: "0.05"
                overpaid_threshold: "0.00"
                auto_convert: false
                auto_convert_currency_id: null
                auto_withdraw: false
                other_enabled: true
                popular_enabled: true
                stable_enabled: true
                created_at: "2023-12-20T11:03:20.888Z"
                modified_at: "2026-05-25T10:30:00.000Z"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/v1/shops/{shop_id}/default/:
    post:
      tags:
        - Shops
      summary: Сделать магазин дефолтным
      description: >
        Помечает указанный магазин дефолтным для текущего пользователя.
        Дефолтный магазин используется как магазин по умолчанию при работе
        с ShopTokenAuthentication, если `shop_id` явно не передан.
      operationId: setDefaultShop
      parameters:
        - $ref: '#/components/parameters/ShopIdPath'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Магазин помечен как дефолтный.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shop'
              example:
                id: "feff876c-aaa5-4c65-9483-75498deabe28"
                name: "My Crypto Shop"
                active: true
                mock: false
                webhook_url: "https://example.com/webhooks/zion"
                hmac_secret: "1e4b6d020d81cc5749a9e370a946c0ef"
                website_link: "https://example.com"
                cancel_url: "https://example.com/payment/cancel"
                success_url: "https://example.com/payment/success"
                commission_rate: "0.0100"
                underpaid_threshold: "0.00"
                overpaid_threshold: "0.00"
                auto_convert: false
                auto_convert_currency_id: null
                auto_withdraw: false
                other_enabled: true
                popular_enabled: true
                stable_enabled: true
                created_at: "2023-12-20T11:03:20.888Z"
                modified_at: "2023-12-20T11:03:20.892Z"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/v1/shops/{shop_id}/balance/:
    get:
      tags:
        - Shops
      summary: Текущий баланс магазина
      description: >
        Возвращает текущий баланс магазина с разбивкой по валютам.
        Баланс рассчитывается из внутренних транзакций `core_internaltransaction`
        (Deposit / Withdraw / Fee).
      operationId: getShopBalance
      parameters:
        - $ref: '#/components/parameters/ShopIdPath'
      responses:
        '200':
          description: Текущий баланс магазина.
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  $ref: '#/components/schemas/Money'
                description: >
                  Словарь `{currency_code: balance}`, где ключ — код криптовалюты
                  (например `"USDT"`, `"ETH"`), значение — баланс как строка.
              example:
                USDT: "1250.500000"
                ETH: "0.350000"
                BTC: "0.012500"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/v1/shops/{shop_id}/estimated-balance/:
    get:
      tags:
        - Shops
      summary: Оценочный баланс магазина
      description: >
        Возвращает оценочный (ожидаемый к получению) баланс магазина.
        Учитывает платежи в статусе PENDING, которые ещё не подтверждены блокчейном.
      operationId: getShopEstimatedBalance
      parameters:
        - $ref: '#/components/parameters/ShopIdPath'
      responses:
        '200':
          description: Оценочный баланс магазина.
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  $ref: '#/components/schemas/Money'
                description: >
                  Словарь `{currency_code: estimated_balance}`.
              example:
                USDT: "500.000000"
                ETH: "0.100000"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/v1/shops/{shop_id}/affiliate-balance/:
    get:
      tags:
        - Shops
      summary: Реферальный баланс магазина
      description: >
        Возвращает реферальный (affiliate) баланс магазина — средства, накопленные
        от партнёрской программы и доступные для вывода через `affiliate-withdrawals`.
      operationId: getShopAffiliateBalance
      parameters:
        - $ref: '#/components/parameters/ShopIdPath'
      responses:
        '200':
          description: Реферальный баланс магазина.
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  $ref: '#/components/schemas/Money'
                description: >
                  Словарь `{currency_code: affiliate_balance}`.
              example:
                USDT: "75.250000"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/v1/shops/{shop_id}/total-deposits-summary/:
    get:
      tags:
        - Shops
      summary: Итоговая сводка депозитов
      description: >
        Возвращает агрегированную сводку по всем завершённым депозитам магазина
        с разбивкой по валютам: общее количество и суммы.
      operationId: getShopTotalDepositsSummary
      parameters:
        - $ref: '#/components/parameters/ShopIdPath'
      responses:
        '200':
          description: Итоговая сводка депозитов.
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_count:
                    type: integer
                    description: Общее число завершённых депозитов.
                    example: 348
                  currencies:
                    type: array
                    description: Сводка по каждой валюте.
                    items:
                      type: object
                      properties:
                        currency:
                          type: string
                          description: Код криптовалюты.
                          example: "USDT"
                        total_amount:
                          $ref: '#/components/schemas/Money'
                        count:
                          type: integer
                          description: Число депозитов в этой валюте.
                          example: 210
              example:
                total_count: 348
                currencies:
                  - currency: "USDT"
                    total_amount: "48250.500000"
                    count: 210
                  - currency: "ETH"
                    total_amount: "12.750000"
                    count: 138
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/v1/shops/{shop_id}/affiliate-stats/:
    get:
      tags:
        - Shops
      summary: Статистика партнёрской программы
      description: >
        Возвращает статистику по реферальной (affiliate) программе магазина:
        число привлечённых пользователей, суммы комиссий по уровням.
      operationId: getShopAffiliateStats
      parameters:
        - $ref: '#/components/parameters/ShopIdPath'
      responses:
        '200':
          description: Статистика партнёрской программы.
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_referrals:
                    type: integer
                    description: Общее число рефералов.
                    example: 15
                  levels:
                    type: array
                    description: Разбивка по уровням реферальной программы.
                    items:
                      type: object
                      properties:
                        level:
                          type: integer
                          description: Уровень реферальной программы (1, 2, 3...).
                          example: 1
                        count:
                          type: integer
                          description: Число рефералов на этом уровне.
                          example: 10
                        total_amount:
                          $ref: '#/components/schemas/Money'
              example:
                total_referrals: 15
                levels:
                  - level: 1
                    count: 10
                    total_amount: "250.000000"
                  - level: 2
                    count: 5
                    total_amount: "50.000000"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/v1/shops/{shop_id}/invoices/:
    get:
      tags:
        - Invoices
      summary: Список инвойсов
      description: >
        Возвращает список инвойсов магазина с поддержкой пагинации и фильтрации.
        Фильтры: `reference`, `order_id`, `created_at`.
