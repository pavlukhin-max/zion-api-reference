                    type: "WITHDRAW"
                    status: "COMPLETED"
                    note: null
                    external_reference: null
                    approved_at: "2023-10-16T21:08:08.332Z"
                    failed_at: null
                    disapproved_at: null
                    refunded_at: null
                    created_at: "2023-10-16T20:00:00.000Z"
                    modified_at: "2023-10-16T21:08:08.332Z"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    post:
      tags:
        - Withdrawals
      summary: Создать вывод
      description: >
        Создаёт запрос на вывод средств с баланса магазина на указанный адрес.


        **Требуется IP whitelist (`IsIPValidPermission`):** IP-адрес, с которого
        выполняется запрос, должен быть добавлен в белый список магазина
        (Настройки → Shop IPs в дашборде). Без одобренного IP-адреса запрос
        вернёт `403 Forbidden`.


        **Внимание:** операция необратима — вывод после подтверждения нельзя
