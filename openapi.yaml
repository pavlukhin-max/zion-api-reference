    ShopToken:
      type: object
      description: >
        API-токен магазина для программной интеграции. Поле `key` (Bearer-токен)
        возвращается только при создании (`POST`). При последующих запросах
        (`GET`) `key` скрыт и не передаётся.
      required:
        - shop
        - user
        - created
      properties:
        key:
          type: string
          writeOnly: true
          description: >
            Bearer-токен магазина (40 символов). Возвращается только при
            создании токена. Храните в надёжном месте — повторно получить
            невозможно.
          example: "a3249fb664f839736f65c7f8bf5ead3a5cbf24e3"
        shop:
          type: string
          format: uuid
          readOnly: true
          description: ID магазина, которому принадлежит токен.
          example: "feff876c-aaa5-4c65-9483-75498deabe28"
        user:
          type: string
          format: uuid
          readOnly: true
          description: ID пользователя, создавшего токен.
          example: "a1fedcaa-a6a1-4c11-bbf0-fe63e17e0c36"
        created:
          type: string
          format: date-time
          readOnly: true
          description: Дата и время создания токена.
          example: "2023-12-05T18:22:26.144Z"
      example:
        shop: "feff876c-aaa5-4c65-9483-75498deabe28"
        user: "a1fedcaa-a6a1-4c11-bbf0-fe63e17e0c36"
        created: "2023-12-05T18:22:26.144Z"

    ShopTokenCreated:
      type: object
      description: Ответ при успешном создании токена — включает поле `key` с полным значением Bearer-токена.
      allOf:
        - $ref: '#/components/schemas/ShopToken'
      example:
        key: "a3249fb664f839736f65c7f8bf5ead3a5cbf24e3"
        shop: "feff876c-aaa5-4c65-9483-75498deabe28"
        user: "a1fedcaa-a6a1-4c11-bbf0-fe63e17e0c36"
        created: "2023-12-05T18:22:26.144Z"

