          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/v1/shops/{shop_id}/affiliate-referrals/:
    get:
      tags:
        - Affiliate
      summary: Список рефералов
      description: >
        Возвращает список пользователей, привлечённых через реферальную программу
        магазина, с агрегированной статистикой. Поддерживает сортировку по
        `total_amount`, `transaction_count`.
      operationId: listAffiliateReferrals
      parameters:
        - $ref: '#/components/parameters/ShopIdPath'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
        - $ref: '#/components/parameters/OrderingParam'
      responses:
        '200':
          description: Список рефералов успешно получен.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAffiliateReferrals'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  # ── Analytics ─────────────────────────────────────────────────────────────

  /api/v1/shops/{shop_id}/daily-deposits/:
    get:
      tags:
        - Analytics
      summary: Ежедневная статистика депозитов
      description: >
        Возвращает агрегированную статистику депозитов по дням.
        Сериализатор `PeriodicallyDepositSerializer`.
      operationId: listDailyDeposits
      parameters:
        - $ref: '#/components/parameters/ShopIdPath'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
        - $ref: '#/components/parameters/CreatedAtAfter'
        - $ref: '#/components/parameters/CreatedAtBefore'
      responses:
        '200':
          description: Ежедневная статистика успешно получена.
