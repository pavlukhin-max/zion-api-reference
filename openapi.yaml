              schema:
                $ref: '#/components/schemas/PaginatedHooks'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/v1/shops/{shop_id}/hooks/{hook_id}/:
    get:
      tags:
        - Webhooks (incoming)
      summary: Получить webhook-событие
      description: Возвращает детали конкретной записи webhook (payload, статус ответа, время доставки).
      operationId: getHook
      parameters:
        - $ref: '#/components/parameters/ShopIdPath'
        - $ref: '#/components/parameters/HookIdPath'
      responses:
        '200':
          description: Запись webhook найдена.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Hook'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'

webhooks:
  paymentStatusChanged:
    post:
      tags:
        - Webhooks (incoming)
      summary: Изменение статуса платежа
      description: |
        Zion отправляет этот POST-запрос на `Callback URL` магазина при каждом изменении
        статуса платежа (PENDING → CONFIRMING → COMPLETED / EXPIRED / UNDERPAID и т.д.).

        **Подпись:** заголовок `X-Signature` содержит HMAC SHA-1 от raw body запроса
        (hex-encoded). Ключ подписи — поле `Hook.secret` (настраивается в дашборде
        https://zionpayment.com → настройки магазина → вебхуки). Всегда верифицируйте
        подпись перед обработкой события.

        **Ретраи:** если ваш сервер вернул не 2xx, Zion повторит запрос с экспоненциальным
        backoff'ом. Рекомендуется отвечать `200 OK` как можно быстрее и обрабатывать
        событие асинхронно.
      security: []
      parameters:
        - in: header
          name: X-Signature
          required: true
          schema:
            type: string
            pattern: '^[a-f0-9]{40}$'
          description: >
            HMAC SHA-1 hex-дайджест от raw тела запроса.
            Ключ — `Hook.secret` из настроек вебхука в дашборде.
            Пример: `a3f1c9b2e7d0843c19f5dd6a024e81b23c7f4d01`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentWebhookPayload'
            example:
              id: "69c7237e-1066-4908-9b84-4d701bbe600d"
              created_at: "2023-12-05T18:26:53.975146Z"
              modified_at: "2023-12-05T18:26:54.003033Z"
              reference: "3bb21c57ac"
              order_id: null
              order_description: null
              status: "COMPLETED"
              address: "0x7718Dc551a65DCaD5ADaC92753deE77Afd0C3f72"
              currency: "USDTERC20"
              amount: "10.000000"
              received_amount: "10.000000"
              outcome_amount: "9.900000"
              fixed_rate: true
              fee_paid_by_user: false
              commission_paid_by_user: false
              rate: null
              deposit_hash: "0xabc123def456789abcdef0123456789abcdef0123456789abcdef0123456789"
              deposit_block_date: "2023-12-05T18:26:50.000Z"
              fee: "7.007354"
              commission: "0.100000"
              preliminary_model: "DONATION_LINK"
              preliminary_reference: "3504a0f7e6"
              invoice_amount: null
      responses:
        '200':
          description: >
            Магазин подтвердил получение. Любой HTTP 2xx считается успехом —
            Zion отметит доставку и прекратит ретраи.
        '4XX':
          description: >
            Магазин отверг запрос. Zion может ретраить в зависимости от кода
            (например, 429 — ретраит, 400 — может прекратить попытки).
        '5XX':
          description: >
            Временная ошибка на стороне магазина. Zion ретраит с backoff'ом.

  withdrawalStatusChanged:
    post:
      tags:
        - Webhooks (incoming)
      summary: Изменение статуса вывода средств
      description: |
        Zion отправляет этот POST-запрос на `Callback URL` магазина при изменении
        статуса вывода (PENDING → APPROVING → CONFIRMING → COMPLETED / FAILED / DISAPPROVED).

        **Подпись:** заголовок `X-Signature` содержит HMAC SHA-1 от raw body запроса
        (hex-encoded). Ключ подписи — поле `Hook.secret` из настроек магазина в дашборде.
        Всегда верифицируйте подпись перед обработкой события.

        **Ретраи:** аналогично `paymentStatusChanged` — при не-2xx ответе Zion повторит
        запрос с экспоненциальным backoff'ом.
      security: []
      parameters:
        - in: header
          name: X-Signature
          required: true
          schema:
            type: string
            pattern: '^[a-f0-9]{40}$'
          description: >
            HMAC SHA-1 hex-дайджест от raw тела запроса.
            Ключ — `Hook.secret` из настроек вебхука в дашборде.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WithdrawalWebhookPayload'
            example:
              id: "b8a6b808-6826-48d1-911a-e1c2bbe27912"
              created_at: "2023-10-16T20:00:00.000Z"
              modified_at: "2023-10-16T21:08:08.332Z"
              reference: "wd_a1b2c3d4e5"
              currency: "USDTTRC20"
              amount: "100.000000"
              fee: "2.000000"
              address: "TRKxd8cZugoMpDyLjnFrafoHz2j4mGUgo2"
              transaction_hash: "8bd11d14987557b36022bde3adec60e70e17540d625e04cf263b37aed4ea4a06"
              type: "WITHDRAW"
              status: "COMPLETED"
              note: null
              external_reference: null
              approved_at: "2023-10-16T21:08:08.332Z"
              failed_at: null
              disapproved_at: null
              refunded_at: null
      responses:
        '200':
          description: >
            Магазин подтвердил получение. Любой HTTP 2xx считается успехом.
        '4XX':
          description: Магазин отверг запрос. Zion может ретраить.
        '5XX':
          description: Временная ошибка на стороне магазина. Zion ретраит с backoff'ом.

components:
  securitySchemes:
    TokenAuth:
      type: apiKey
      in: header
      name: Authorization
      description: |
        DRF Token authentication. Передавайте API-ключ в заголовке `Authorization`
        с префиксом `Token ` (с пробелом). Пример: `Authorization: Token abc123...`.

        **Важно:** это НЕ Bearer и НЕ OAuth — указывайте префикс `Token`.

        Получить ключ — в дашборде https://zionpayment.com → магазин → токены.

  parameters:
    LimitParam:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
      description: Максимальное количество объектов в ответе. По умолчанию 10.

    OffsetParam:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
      description: Количество объектов, которые нужно пропустить от начала списка.

    OrderingParam:
      name: ordering
      in: query
      required: false
      schema:
        type: string
      description: "Поле сортировки, префикс `-` для убывания. Например: `-created_at`."

    ShopIdPath:
      name: shop_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: ID магазина (UUID).
      example: "00000000-0000-0000-0000-000000000000"

    InvoiceIdPath:
      name: invoice_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: ID инвойса (UUID).
      example: "e5cf9fc4-35af-456c-9f15-17823f44488d"

    DonationLinkIdPath:
      name: donation_link_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: ID донат-ссылки (UUID).
      example: "8b463fd1-bd03-496b-840c-08eb3518cea0"

    PosLinkIdPath:
      name: pos_link_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: ID POS-ссылки (UUID).
      example: "b86717ca-81a1-4813-98cc-27e4f25e7819"

    CreatedAtAfter:
      name: created_at_after
      in: query
      required: false
      schema:
        type: string
        format: date-time
      description: Фильтр — показать объекты, созданные после указанной даты и времени (ISO 8601).
      example: "2026-01-01T00:00:00Z"

    CreatedAtBefore:
      name: created_at_before
      in: query
      required: false
      schema:
        type: string
        format: date-time
      description: Фильтр — показать объекты, созданные до указанной даты и времени (ISO 8601).
      example: "2026-12-31T23:59:59Z"

    SubscriptionIdPath:
      name: subscription_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: ID подписки (UUID).
      example: "fa3bf8c3-c1d8-429c-b5d8-52fa41406c8c"

    SubscriptionCustomerIdPath:
      name: subscription_customer_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: ID клиента подписки (UUID).
      example: "8d070af6-8a3b-4e46-bfd6-544377d4bfcb"

    PaymentIdPath:
      name: payment_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: ID платежа (UUID).
      example: "9ada8297-5ac9-4810-a184-3de37f617677"

    FiatPaymentIdPath:
      name: fiat_payment_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: ID фиат-платежа (UUID).
      example: "b337b3ac-fa5c-4eea-99b6-f502aeb459c8"

    WithdrawalIdPath:
      name: withdrawal_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: ID вывода средств (UUID).
      example: "b8a6b808-6826-48d1-911a-e1c2bbe27912"

    MassWithdrawalIdPath:
      name: mass_withdrawal_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: ID массового вывода (UUID).
      example: "f58aac36-29b9-40aa-938f-b1b6cc0007a8"

    ConversionIdPath:
      name: conversion_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: ID конвертации (UUID).
      example: "3d9d20ad-b021-4aad-bf45-63dd5f4ed659"

    MemberIdPath:
      name: member_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: ID участника магазина (UUID).
      example: "8853c330-d563-409a-a184-455b1bb063f8"

    ShopTokenIdPath:
      name: token_key
      in: path
      required: true
      schema:
        type: string
        minLength: 40
        maxLength: 40
      description: Ключ API-токена магазина (40 символов).
      example: "a3249fb664f839736f65c7f8bf5ead3a5cbf24e3"

    ShopWalletIdPath:
      name: shop_wallet_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: ID кошелька магазина (UUID).
      example: "9c61d576-ea46-4408-ad73-def4dfa52989"

    ShopIPIdPath:
      name: shop_ip_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: ID IP-адреса в белом списке магазина (UUID).
      example: "c7bdef28-ba72-46e8-9924-dc2b3f7c980b"

    ReferralLinkIdPath:
      name: referral_link_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: ID реферальной ссылки (UUID).
      example: "03f8d13e-10ad-4b9a-9186-0f0ccfdf98a6"

    HookIdPath:
      name: hook_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: ID записи webhook (UUID).
      example: "2fd2adf0-b96c-48e1-a1de-a695442cdc6e"

  responses:
    BadRequest:
      description: Ошибка валидации входных данных.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationError'
          example:
            amount:
              - "Ensure this value is greater than 0."
            email:
              - "This field is required."

    Unauthorized:
      description: Требуется аутентификация.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            detail: "Authentication credentials were not provided."

    Forbidden:
      description: Недостаточно прав для выполнения операции.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            detail: "You do not have permission to perform this action."

    NotFound:
      description: Запрошенный ресурс не найден.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            detail: "Not found."

    TooManyRequests:
      description: Превышен лимит запросов.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            detail: "Request was throttled. Expected available in 47 seconds."

  schemas:
    Error:
      type: object
      required:
        - detail
      properties:
        detail:
          type: string
          example: "Authentication credentials were not provided."
      example:
        detail: "Authentication credentials were not provided."

    ValidationError:
      type: object
      additionalProperties:
        type: array
        items:
          type: string
      example:
        amount:
          - "Ensure this value is greater than 0."
        email:
          - "This field is required."

    Page:
      type: object
      required:
        - count
        - results
      properties:
        count:
          type: integer
          description: Общее количество объектов (без пагинации).
          example: 42
        next:
          type: string
          format: uri
          nullable: true
          description: URL следующей страницы или null.
          example: "https://api.zionpayment.com/api/v1/shops/00000000-0000-0000-0000-000000000000/payments/?limit=10&offset=10"
        previous:
          type: string
          format: uri
          nullable: true
          description: URL предыдущей страницы или null.
          example: null
        results:
          type: array
          description: Массив объектов текущей страницы.
          items: {}

    Money:
      type: string
      pattern: "^[0-9]+\\.[0-9]+$"
      description: >
        Сумма как строка с десятичным форматом. НЕ number — иначе теряется
        точность при работе с крипто-суммами.
      example: "10.000000"

    Shop:
      type: object
      required:
        - id
        - name
        - active
        - commission_rate
        - auto_convert
        - other_enabled
        - popular_enabled
        - stable_enabled
        - auto_withdraw
        - created_at
        - modified_at
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: Уникальный идентификатор магазина.
          example: "feff876c-aaa5-4c65-9483-75498deabe28"
        name:
          type: string
          description: Название магазина.
          example: "My Crypto Shop"
        active:
          type: boolean
          readOnly: true
          description: Активен ли магазин.
          example: true
        mock:
          type: boolean
          readOnly: true
          description: Тестовый (mock) режим магазина. В mock-режиме платежи не списываются реально.
          example: false
        webhook_url:
          type: string
          format: uri
          nullable: true
          description: >
            URL для входящих вебхуков от Zion. Zion отправляет POST на этот адрес
            при изменении статуса платежей и выводов. Подпись передаётся в заголовке
            `X-Signature` (HMAC SHA-1 от raw body, hex).
          example: "https://example.com/webhooks/zion"
        hmac_secret:
          type: string
          readOnly: true
          description: >
            Секрет для верификации подписи вебхуков (HMAC SHA-1).
            Используйте это значение для проверки заголовка `X-Signature`.
          example: "1e4b6d020d81cc5749a9e370a946c0ef"
        website_link:
          type: string
          format: uri
          nullable: true
          description: URL сайта мерчанта.
          example: "https://example.com"
        cancel_url:
          type: string
          format: uri
          nullable: true
          description: URL для редиректа при отмене платежа.
          example: "https://example.com/payment/cancel"
        success_url:
          type: string
          format: uri
          nullable: true
          description: URL для редиректа при успешном платеже.
          example: "https://example.com/payment/success"
        commission_rate:
          type: string
          pattern: "^[0-9]+\\.[0-9]+$"
          description: Комиссионная ставка магазина (десятичная дробь, например «0.0100» = 1%).
          example: "0.0100"
        underpaid_threshold:
          type: string
          pattern: "^[0-9]+\\.[0-9]+$"
          description: >
            Порог недоплаты (0.00–1.00). Если клиент заплатил меньше на эту долю,
            платёж всё равно считается успешным.
          example: "0.00"
        overpaid_threshold:
          type: string
          pattern: "^[0-9]+\\.[0-9]+$"
          description: >
            Порог переплаты (0.00–1.00). Если клиент заплатил больше на эту долю,
            Zion не возвращает излишек автоматически.
          example: "0.00"
        auto_convert:
          type: boolean
          description: >
            Включить авто-конвертацию входящих платежей в валюту `auto_convert_currency`.
          example: false
        auto_convert_currency_id:
          type: string
          format: uuid
          nullable: true
          description: ID валюты для авто-конвертации. Обязателен, если `auto_convert = true`.
          example: null
        auto_withdraw:
          type: boolean
          description: >
            Включить автоматический вывод средств на кошельки из `shop-wallets`.
          example: false
        other_enabled:
          type: boolean
          description: Разрешить приём платежей в «прочих» (не popular, не stable) монетах.
          example: true
        popular_enabled:
          type: boolean
          description: Разрешить приём платежей в популярных монетах (BTC, ETH и т.п.).
          example: true
        stable_enabled:
          type: boolean
          description: Разрешить приём платежей в стейблкоинах (USDT, USDC и т.п.).
          example: true
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Дата и время создания магазина (ISO 8601).
          example: "2023-12-20T11:03:20.888Z"
        modified_at:
          type: string
          format: date-time
          readOnly: true
          description: Дата и время последнего изменения магазина (ISO 8601).
          example: "2023-12-20T11:03:20.892Z"
      example:
        id: "feff876c-aaa5-4c65-9483-75498deabe28"
