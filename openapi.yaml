    Withdrawal:
      type: object
      description: >
        Запись о выводе средств с баланса магазина на внешний крипто-адрес.
        Наследует базовые поля от `TransactionRequest` (id, currency, amount,
        fee, reference, created_at, modified_at). Тип `type` определяет
        источник средств: `WITHDRAW` — основной баланс, `AFFILIATE_WITHDRAW` —
        реферальный баланс, `MASS_WITHDRAWAL` — пакетный вывод.
      required:
        - id
        - shop
        - currency
        - amount
        - fee
        - address
        - type
        - status
        - created_at
        - modified_at
      properties:
        id:
          type: string
          format: uuid
          description: Уникальный идентификатор вывода.
          example: "b8a6b808-6826-48d1-911a-e1c2bbe27912"
        shop:
          type: string
          format: uuid
          description: ID магазина, которому принадлежит вывод.
          example: "feff876c-aaa5-4c65-9483-75498deabe28"
        reference:
          type: string
          nullable: true
          description: Внутренний референс операции (генерируется сервером).
          example: "wd_a1b2c3d4e5"
        currency:
          type: string
          description: Код криптовалюты вывода (например `USDTTRC20`).
          example: "USDTTRC20"
        amount:
          $ref: '#/components/schemas/Money'
        fee:
          $ref: '#/components/schemas/Money'
        address:
          type: string
          description: Адрес получателя в соответствующей блокчейн-сети.
          example: "TRKxd8cZugoMpDyLjnFrafoHz2j4mGUgo2"
        transaction_hash:
          type: string
          nullable: true
          description: Хэш транзакции в блокчейне (заполняется после отправки).
          example: "8bd11d14987557b36022bde3adec60e70e17540d625e04cf263b37aed4ea4a06"
        type:
          type: string
          enum:
            - WITHDRAW
            - AFFILIATE_WITHDRAW
            - MASS_WITHDRAWAL
          description: >
            Тип вывода: `WITHDRAW` — обычный вывод основного баланса;
            `AFFILIATE_WITHDRAW` — вывод реферального баланса;
            `MASS_WITHDRAWAL` — вывод в рамках пакетной операции.
          example: "WITHDRAW"
        status:
          type: string
          enum:
            - PENDING
            - APPROVING
            - CONFIRMING
            - COMPLETED
            - FAILED
            - DISAPPROVED
          description: >
            Статус вывода: `PENDING` — ожидает обработки; `APPROVING` — на
            проверке у саппорта; `CONFIRMING` — транзакция отправлена, ожидает
            подтверждения в блокчейне; `COMPLETED` — успешно завершён;
            `FAILED` — ошибка при обработке; `DISAPPROVED` — отклонён саппортом.
          example: "COMPLETED"
        note:
          type: string
          nullable: true
          description: Произвольная заметка, указанная при создании вывода.
          example: "Выплата за июль"
        external_reference:
          type: string
          nullable: true
          description: Внешний референс (если передавался при создании).
          example: null
        approved_at:
          type: string
          format: date-time
          nullable: true
          description: Дата и время одобрения вывода.
          example: "2023-10-16T21:08:08.332Z"
        failed_at:
          type: string
          format: date-time
          nullable: true
          description: Дата и время неудачной попытки обработки.
          example: null
        disapproved_at:
          type: string
          format: date-time
          nullable: true
          description: Дата и время отклонения вывода.
          example: null
        refunded_at:
          type: string
          format: date-time
          nullable: true
          description: Дата и время возврата средств (если был произведён рефанд).
          example: null
        created_at:
          type: string
          format: date-time
          description: Дата и время создания.
          example: "2023-10-16T20:00:00.000Z"
        modified_at:
          type: string
          format: date-time
          description: Дата и время последнего обновления.
          example: "2023-10-16T21:08:08.332Z"
      example:
        id: "b8a6b808-6826-48d1-911a-e1c2bbe27912"
        shop: "feff876c-aaa5-4c65-9483-75498deabe28"
        reference: "wd_a1b2c3d4e5"
        currency: "USDTTRC20"
        amount: "100.000000"
        fee: "2.000000"
        address: "TRKxd8cZugoMpDyLjnFrafoHz2j4mGUgo2"
        transaction_hash: "8bd11d14987557b36022bde3adec60e70e17540d625e04cf263b37aed4ea4a06"
        type: "WITHDRAW"
        status: "COMPLETED"
        note: null
        external_reference: null
        approved_at: "2023-10-16T21:08:08.332Z"
        failed_at: null
        disapproved_at: null
        refunded_at: null
        created_at: "2023-10-16T20:00:00.000Z"
        modified_at: "2023-10-16T21:08:08.332Z"

