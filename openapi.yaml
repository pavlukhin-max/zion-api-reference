            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDailyDeposits'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/v1/shops/{shop_id}/monthly-deposits/:
    get:
      tags:
        - Analytics
      summary: Ежемесячная статистика депозитов
      description: >
