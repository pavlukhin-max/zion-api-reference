  # ── Withdrawals with OTP ────────────────────────────────────────────────────

  /api/v1/shops/{shop_id}/withdrawals-with-otp/:
    get:
      tags:
        - Withdrawals
      summary: Список выводов с OTP
      description: >
        Возвращает список выводов, созданных через OTP-подтверждённый flow
        (тип `WITHDRAW`, обработанных через `WithOTPPermission`).
      operationId: listWithdrawalsWithOtp
      parameters:
        - $ref: '#/components/parameters/ShopIdPath'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
        - $ref: '#/components/parameters/OrderingParam'
        - $ref: '#/components/parameters/CreatedAtAfter'
        - $ref: '#/components/parameters/CreatedAtBefore'
      responses:
        '200':
          description: Список выводов с OTP-подтверждением.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedWithdrawals'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    post:
      tags:
        - Withdrawals
      summary: Создать вывод с OTP-подтверждением
      description: >
        Создаёт вывод средств с дополнительным подтверждением через одноразовый
        пароль (OTP). После вызова Zion отправляет OTP-код на email или SMS
        владельца магазина — код нужно передать в поле `otp_code`.


        **Требуется OTP scope (`WithOTPPermission`):** для API-токена магазина
        должно быть включено разрешение на OTP-операции в настройках магазина
        (Настройки → Токены → OTP). Без этого разрешения запрос вернёт
        `403 Forbidden`.


        **Внимание:** операция необратима. Убедитесь в правильности адреса
        получателя перед отправкой OTP-кода.
      operationId: createWithdrawalWithOtp
      parameters:
        - $ref: '#/components/parameters/ShopIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WithdrawalOtpCreateRequest'
            example:
              currency: "USDTTRC20"
              amount: "500.000000"
              address: "TRKxd8cZugoMpDyLjnFrafoHz2j4mGUgo2"
              otp_code: "847291"
              note: "Вывод с OTP"
      responses:
        '201':
          description: Вывод с OTP создан и поставлен в очередь.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Withdrawal'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'

