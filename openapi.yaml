    FiatPayment:
      type: object
      required:
        - id
        - reference
        - currency
        - amount
        - destination_currency
        - status
        - country
        - created_at
        - modified_at
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: Уникальный идентификатор фиат-платежа (UUID transactionrequest).
          example: "b337b3ac-fa5c-4eea-99b6-f502aeb459c8"
        shop:
          type: string
          format: uuid
          nullable: true
          description: ID магазина.
          example: "feff876c-aaa5-4c65-9483-75498deabe28"
        reference:
          type: string
          description: Короткий уникальный идентификатор (10 символов).
          example: "183a633938"
        currency:
          type: string
          description: >
            Код фиатной валюты клиента (ISO 4217), в которой производится оплата.
            Например USD, EUR, RUB.
          example: "USD"
        amount:
          $ref: '#/components/schemas/Money'
        destination_currency:
          type: string
          description: Код криптовалюты, которую получит мерчант (например USDTTRC20).
          example: "USDTTRC20"
        status:
          type: string
          enum:
            - PENDING
            - CONFIRMING
            - COMPLETED
            - EXPIRED
            - FAILED
          description: >
            Статус фиат-платежа.
            PENDING — ожидает действий клиента;
            CONFIRMING — ордер у провайдера создан, ожидаем обработки;
            COMPLETED — средства получены;
            EXPIRED — истёк таймаут;
            FAILED — ошибка обработки у провайдера.
          example: "PENDING"
        provider:
          type: string
          nullable: true
          description: Провайдер платежа (например «Changelly»).
          example: "Changelly"
        country:
          type: string
          maxLength: 2
          description: ISO 3166-1 alpha-2 код страны клиента.
          example: "US"
        payment_method:
          type: string
          nullable: true
          description: Способ оплаты у провайдера (например «card», «bank_transfer»).
          example: "card"
        state:
          type: string
          nullable: true
          description: Штат/регион клиента (если требуется провайдером).
          example: null
        external_order_id:
          type: string
          nullable: true
          description: Идентификатор ордера у провайдера (Changelly order ID).
          example: "ch_abc123"
        external_redirect_url:
          type: string
          nullable: true
          description: URL для редиректа клиента на страницу оплаты провайдера.
          example: "https://changelly.com/pay/ch_abc123"
        converted_amount:
          $ref: '#/components/schemas/Money'
        received_amount:
          $ref: '#/components/schemas/Money'
        fixed_rate:
          type: boolean
          description: Был ли зафиксирован курс.
          example: true
        fee_paid_by_user:
