                address: "TRKxd8cZugoMpDyLjnFrafoHz2j4mGUgo2"
                transaction_hash: null
                type: "WITHDRAW"
                status: "PENDING"
                note: "Выплата за июль"
                external_reference: null
                approved_at: null
                failed_at: null
                disapproved_at: null
                refunded_at: null
                created_at: "2026-05-25T12:00:00.000Z"
                modified_at: "2026-05-25T12:00:00.000Z"
        '400':
