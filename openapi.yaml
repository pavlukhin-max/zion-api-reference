          type: integer
          description: Общее количество депозитов от рефералов.
          example: 45
        total_commission:
          $ref: '#/components/schemas/Money'
        currency:
          type: string
          nullable: true
          description: Валюта, в которой выражена комиссия.
          example: "USDTTRC20"
      example:
        total_referrals: 12
        total_deposits: 45
        total_commission: "450.000000"
        currency: "USDTTRC20"

    DailyDeposit:
      type: object
      description: >
        Статистика депозитов за один день. Сериализатор `PeriodicallyDepositSerializer`.
        Используется для эндпоинтов `/daily-deposits/` и `/monthly-deposits/`.
      required:
        - date
        - currency
        - total_amount
        - count
      properties:
        date:
          type: string
          format: date
          description: Дата (для `/daily-deposits/`) или первый день месяца (для `/monthly-deposits/`).
          example: "2026-05-01"
        currency:
          type: string
          description: Код криптовалюты.
          example: "USDTTRC20"
        total_amount:
          $ref: '#/components/schemas/Money'
        count:
          type: integer
          description: Количество депозитов за период.
          example: 10
      example:
        date: "2026-05-01"
        currency: "USDTTRC20"
        total_amount: "1000.000000"
        count: 10

    PaginatedDailyDeposits:
      allOf:
        - $ref: '#/components/schemas/Page'
        - type: object
          properties:
            results:
              type: array
              items:
                $ref: '#/components/schemas/DailyDeposit'
      example:
        count: 30
        next: null
        previous: null
        results:
          - date: "2026-05-01"
            currency: "USDTTRC20"
            total_amount: "1000.000000"
            count: 10

    MonthlyDeposit:
      type: object
      description: >
        Статистика депозитов за один месяц. Использует тот же сериализатор
        `PeriodicallyDepositSerializer`, что и `DailyDeposit`.
      required:
        - date
        - currency
        - total_amount
        - count
      properties:
        date:
          type: string
          format: date
          description: Первый день месяца (YYYY-MM-01).
          example: "2026-05-01"
        currency:
          type: string
          description: Код криптовалюты.
          example: "USDTTRC20"
        total_amount:
          $ref: '#/components/schemas/Money'
        count:
          type: integer
          description: Количество депозитов за месяц.
          example: 100
      example:
        date: "2026-05-01"
        currency: "USDTTRC20"
        total_amount: "10000.000000"
        count: 100

    PaginatedMonthlyDeposits:
      allOf:
        - $ref: '#/components/schemas/Page'
        - type: object
          properties:
            results:
              type: array
              items:
                $ref: '#/components/schemas/MonthlyDeposit'
      example:
        count: 12
        next: null
        previous: null
        results:
          - date: "2026-05-01"
            currency: "USDTTRC20"
            total_amount: "10000.000000"
            count: 100

    DailyCurrencyDeposit:
      type: object
      description: >
        Статистика депозитов за день с группировкой по валютам.
        Сериализатор `DailyDepositCurrencySerializer`.
      required:
        - date
        - deposits
      properties:
        date:
          type: string
          format: date
          description: Дата статистики.
          example: "2026-05-01"
        deposits:
          type: array
          description: Список по каждой валюте за этот день.
          items:
            type: object
            required:
              - currency
              - total_amount
              - count
            properties:
              currency:
                type: string
                description: Код криптовалюты.
                example: "USDTTRC20"
              total_amount:
                $ref: '#/components/schemas/Money'
              count:
                type: integer
                description: Количество депозитов.
                example: 5
      example:
        date: "2026-05-01"
        deposits:
          - currency: "USDTTRC20"
            total_amount: "500.000000"
            count: 5
          - currency: "USDTERC20"
            total_amount: "300.000000"
            count: 3

    Hook:
      type: object
      description: >
        Запись об отправленном webhook'е магазина (audit log исходящих событий).
        Содержит payload, HTTP-статус ответа и количество попыток доставки.
      required:
        - id
        - shop
        - webhook_url
        - status
        - payload
        - created_at
        - modified_at
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: Уникальный идентификатор записи webhook.
          example: "2fd2adf0-b96c-48e1-a1de-a695442cdc6e"
        shop:
          type: string
          format: uuid
          nullable: true
          readOnly: true
          description: ID магазина-получателя.
          example: "d676fe56-3db4-4783-a8b4-5d5c3822fa41"
        webhook_url:
          type: string
          format: uri
          maxLength: 200
          readOnly: true
          description: URL, на который был отправлен webhook.
          example: "https://example.com/webhooks/zion"
        status:
          type: integer
          readOnly: true
          description: >
            HTTP-статус ответа от сервера мерчанта (например, 200, 404).
            Значение 0 означает, что запрос не дошёл до сервера (network error).
          example: 200
        payload:
          type: object
          readOnly: true
          description: >
            JSON-payload, отправленный в теле webhook'а. Содержит полный снимок
            объекта на момент события (платёж, вывод и т.д.).
          example:
            id: "69c7237e-1066-4908-9b84-4d701bbe600d"
            status: "PENDING"
            currency: "USDTERC20"
            amount: "10.000000"
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Дата и время создания записи (момент отправки).
          example: "2023-12-05T18:27:09.565Z"
        modified_at:
          type: string
          format: date-time
          readOnly: true
          description: Дата и время последнего обновления записи.
          example: "2023-12-05T18:27:09.565Z"
      example:
        id: "2fd2adf0-b96c-48e1-a1de-a695442cdc6e"
        shop: "d676fe56-3db4-4783-a8b4-5d5c3822fa41"
        webhook_url: "https://zion.ae/wh/zion/"
        status: 404
        payload:
          id: "69c7237e-1066-4908-9b84-4d701bbe600d"
          status: "PENDING"
          currency: "USDTERC20"
          amount: "10.000000"
        created_at: "2023-12-05T18:27:09.565Z"
        modified_at: "2023-12-05T18:27:09.565Z"

    PaginatedHooks:
      allOf:
        - $ref: '#/components/schemas/Page'
        - type: object
          properties:
            results:
              type: array
              items:
                $ref: '#/components/schemas/Hook'
      example:
        count: 1
        next: null
        previous: null
        results:
          - id: "2fd2adf0-b96c-48e1-a1de-a695442cdc6e"
            shop: "d676fe56-3db4-4783-a8b4-5d5c3822fa41"
            webhook_url: "https://zion.ae/wh/zion/"
            status: 404
            payload:
              id: "69c7237e-1066-4908-9b84-4d701bbe600d"
              status: "PENDING"
            created_at: "2023-12-05T18:27:09.565Z"
            modified_at: "2023-12-05T18:27:09.565Z"

    PaymentWebhookPayload:
      type: object
      description: >
        Тело POST-запроса, который Zion отправляет на Callback URL мерчанта при изменении
        статуса платежа. Содержит полный снимок объекта платежа на момент события.
        Поля соответствуют модели `Payment` из MERCHANT API.
      required:
        - id
        - created_at
        - modified_at
        - reference
        - status
        - address
        - currency
        - amount
        - received_amount
      properties:
        id:
          type: string
          format: uuid
          description: Уникальный идентификатор платежа.
          example: "69c7237e-1066-4908-9b84-4d701bbe600d"
        created_at:
          type: string
          format: date-time
          description: Дата и время создания платежа (ISO 8601).
          example: "2023-12-05T18:26:53.975146Z"
        modified_at:
          type: string
          format: date-time
          description: Дата и время последнего изменения (ISO 8601).
          example: "2023-12-05T18:26:54.003033Z"
        reference:
          type: string
          description: Короткий уникальный идентификатор платежа (10 символов).
          example: "3bb21c57ac"
        order_id:
          type: string
          nullable: true
          description: Внешний идентификатор заказа, заданный мерчантом.
          example: null
        order_description:
          type: string
          nullable: true
          description: Описание заказа.
          example: null
        status:
          type: string
          enum:
            - PENDING
            - CONFIRMING
            - COMPLETED
            - EXPIRED
            - UNDERPAID
            - OVERPAID
            - MULTIPLE
            - DELAYED
            - REJECTED
            - RESOLVED
          description: >
            Текущий статус платежа. PENDING — ожидает оплаты;
            CONFIRMING — транзакция найдена, ждём подтверждений;
            COMPLETED — успешно подтверждён; EXPIRED — истёк таймаут;
            UNDERPAID — получена сумма меньше ожидаемой;
            OVERPAID — получена сумма больше ожидаемой;
            MULTIPLE — несколько транзакций на один адрес;
            REJECTED — отклонён KYT или вручную; RESOLVED — разрешён мерчантом.
          example: "COMPLETED"
        address:
          type: string
          description: Адрес депозитного кошелька.
          example: "0x7718Dc551a65DCaD5ADaC92753deE77Afd0C3f72"
        currency:
          type: string
          description: Код криптовалюты платежа (например USDTERC20, USDTTRC20, ETH).
          example: "USDTERC20"
        amount:
          type: string
          description: Ожидаемая сумма в единицах криптовалюты (строка с 6 знаками после запятой).
          example: "10.000000"
        received_amount:
          type: string
          description: Фактически полученная сумма.
          example: "10.000000"
        outcome_amount:
          type: string
          nullable: true
          description: Сумма после вычета комиссий.
          example: "9.900000"
        fixed_rate:
          type: boolean
          description: Был ли зафиксирован курс в момент создания платежа.
          example: true
        fee_paid_by_user:
          type: boolean
          description: Платит ли клиент сетевую комиссию поверх суммы.
          example: false
        commission_paid_by_user:
          type: boolean
          description: Платит ли клиент комиссию Zion поверх суммы.
          example: false
        rate:
          type: string
          nullable: true
          description: Курс обмена в момент создания (если fixed_rate=true).
          example: null
        deposit_hash:
          type: string
          nullable: true
          description: Хеш транзакции депозита в блокчейне (заполняется после подтверждения).
          example: "0xabc123def456789abcdef0123456789abcdef0123456789abcdef0123456789"
        deposit_block_date:
          type: string
          format: date-time
          nullable: true
          description: Дата и время блока с депозитной транзакцией.
          example: "2023-12-05T18:26:50.000Z"
        fee:
          type: string
          nullable: true
          description: Сетевая комиссия (строка, 6 знаков после запятой).
          example: "7.007354"
        commission:
          type: string
          nullable: true
          description: Комиссия Zion (строка, 6 знаков после запятой).
          example: "0.100000"
        preliminary_model:
          type: string
          nullable: true
          enum:
            - INVOICE
            - DONATION_LINK
            - POS_LINK
            - SUBSCRIPTION
          description: Тип объекта, инициировавшего платёж (если применимо).
          example: "DONATION_LINK"
        preliminary_reference:
          type: string
          nullable: true
          description: Reference инвойса/донат-ссылки/подписки.
          example: "3504a0f7e6"
        invoice_amount:
          type: string
          nullable: true
          description: Сумма инвойса (только для INVOICE_PAYMENT).
          example: null
      example:
        id: "69c7237e-1066-4908-9b84-4d701bbe600d"
        created_at: "2023-12-05T18:26:53.975146Z"
        modified_at: "2023-12-05T18:26:54.003033Z"
        reference: "3bb21c57ac"
        order_id: null
        order_description: null
        status: "COMPLETED"
        address: "0x7718Dc551a65DCaD5ADaC92753deE77Afd0C3f72"
        currency: "USDTERC20"
        amount: "10.000000"
        received_amount: "10.000000"
        outcome_amount: "9.900000"
        fixed_rate: true
        fee_paid_by_user: false
        commission_paid_by_user: false
        rate: null
        deposit_hash: "0xabc123def456789abcdef0123456789abcdef0123456789abcdef0123456789"
        deposit_block_date: "2023-12-05T18:26:50.000Z"
        fee: "7.007354"
        commission: "0.100000"
        preliminary_model: "DONATION_LINK"
        preliminary_reference: "3504a0f7e6"
        invoice_amount: null

    WithdrawalWebhookPayload:
      type: object
      description: >
        Тело POST-запроса, который Zion отправляет на Callback URL мерчанта при изменении
        статуса вывода средств. Содержит полный снимок объекта вывода на момент события.
        Поля соответствуют модели `Withdrawal` из MERCHANT API.
      required:
        - id
        - created_at
        - modified_at
        - currency
        - amount
        - fee
        - address
        - type
        - status
      properties:
        id:
          type: string
          format: uuid
          description: Уникальный идентификатор вывода.
          example: "b8a6b808-6826-48d1-911a-e1c2bbe27912"
        created_at:
          type: string
          format: date-time
          description: Дата и время создания вывода (ISO 8601).
          example: "2023-10-16T20:00:00.000Z"
        modified_at:
          type: string
          format: date-time
          description: Дата и время последнего изменения (ISO 8601).
          example: "2023-10-16T21:08:08.332Z"
        reference:
          type: string
          nullable: true
          description: Внутренний референс операции (генерируется сервером).
          example: "wd_a1b2c3d4e5"
        currency:
          type: string
          description: Код криптовалюты вывода (например USDTTRC20).
          example: "USDTTRC20"
        amount:
          type: string
          description: Сумма вывода (строка, 6 знаков после запятой).
          example: "100.000000"
        fee:
          type: string
          description: Сетевая комиссия (строка, 6 знаков после запятой).
          example: "2.000000"
        address:
          type: string
          description: Адрес получателя в блокчейн-сети.
          example: "TRKxd8cZugoMpDyLjnFrafoHz2j4mGUgo2"
        transaction_hash:
          type: string
          nullable: true
          description: Хеш транзакции в блокчейне (заполняется после отправки).
          example: "8bd11d14987557b36022bde3adec60e70e17540d625e04cf263b37aed4ea4a06"
        type:
          type: string
          enum:
            - WITHDRAW
            - AFFILIATE_WITHDRAW
            - MASS_WITHDRAWAL
          description: >
            Тип вывода: WITHDRAW — обычный вывод основного баланса;
            AFFILIATE_WITHDRAW — вывод реферального баланса;
            MASS_WITHDRAWAL — вывод в рамках пакетной операции.
          example: "WITHDRAW"
        status:
          type: string
          enum:
            - PENDING
            - APPROVING
            - CONFIRMING
            - COMPLETED
            - FAILED
            - DISAPPROVED
          description: >
            Текущий статус вывода: PENDING — ожидает обработки;
            APPROVING — на проверке у саппорта; CONFIRMING — транзакция отправлена,
            ждём подтверждений блокчейна; COMPLETED — успешно завершён;
            FAILED — ошибка при обработке; DISAPPROVED — отклонён саппортом.
          example: "COMPLETED"
        note:
          type: string
          nullable: true
          description: Произвольная заметка, указанная при создании вывода.
          example: null
        external_reference:
          type: string
          nullable: true
          description: Внешний референс (если передавался при создании).
          example: null
        approved_at:
          type: string
          format: date-time
          nullable: true
          description: Дата и время одобрения вывода.
          example: "2023-10-16T21:08:08.332Z"
        failed_at:
          type: string
          format: date-time
          nullable: true
          description: Дата и время неудачной попытки обработки.
          example: null
        disapproved_at:
          type: string
          format: date-time
          nullable: true
          description: Дата и время отклонения вывода.
          example: null
        refunded_at:
          type: string
          format: date-time
          nullable: true
          description: Дата и время рефанда.
          example: null
      example:
        id: "b8a6b808-6826-48d1-911a-e1c2bbe27912"
        created_at: "2023-10-16T20:00:00.000Z"
        modified_at: "2023-10-16T21:08:08.332Z"
        reference: "wd_a1b2c3d4e5"
        currency: "USDTTRC20"
        amount: "100.000000"
        fee: "2.000000"
        address: "TRKxd8cZugoMpDyLjnFrafoHz2j4mGUgo2"
        transaction_hash: "8bd11d14987557b36022bde3adec60e70e17540d625e04cf263b37aed4ea4a06"
        type: "WITHDRAW"
        status: "COMPLETED"
        note: null
        external_reference: null
        approved_at: "2023-10-16T21:08:08.332Z"
        failed_at: null
        disapproved_at: null
        refunded_at: null
