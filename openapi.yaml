      summary: Разрешить неоднозначный платёж
      description: >
        Применяется для платежей в статусе MULTIPLE или UNDERPAID/OVERPAID.
        Позволяет мерчанту вручную принять решение — засчитать платёж как выполненный.
      operationId: resolvePayment
      parameters:
        - $ref: '#/components/parameters/ShopIdPath'
