        Сериализатор `PeriodicallyDepositSerializer`.
      operationId: listMonthlyDeposits
      parameters:
        - $ref: '#/components/parameters/ShopIdPath'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
      responses:
        '200':
          description: Ежемесячная статистика успешно получена.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedMonthlyDeposits'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/v1/shops/{shop_id}/daily-currencies-deposits/:
    get:
      tags:
        - Analytics
      summary: Ежедневная статистика по валютам
      description: >
        Возвращает статистику депозитов по дням с группировкой по валютам.
        Кастомный `list()` группирует результаты по дате и валюте.
        Сериализатор `DailyDepositCurrencySerializer`.
      operationId: listDailyCurrenciesDeposits
      parameters:
        - $ref: '#/components/parameters/ShopIdPath'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
        - $ref: '#/components/parameters/CreatedAtAfter'
        - $ref: '#/components/parameters/CreatedAtBefore'
      responses:
        '200':
          description: Статистика по валютам успешно получена.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Page'
                  - type: object
                    properties:
                      results:
                        type: array
                        items:
                          $ref: '#/components/schemas/DailyCurrencyDeposit'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  # ── Hooks (read-only) ─────────────────────────────────────────────────────

  /api/v1/shops/{shop_id}/hooks/:
    get:
      tags:
        - Webhooks (incoming)
      summary: Список webhook-событий
      description: >
        Возвращает историю отправленных webhook-событий магазина (audit log).
        Только чтение — создание и изменение через этот эндпоинт недоступны.
      operationId: listHooks
      parameters:
        - $ref: '#/components/parameters/ShopIdPath'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
        - $ref: '#/components/parameters/OrderingParam'
        - $ref: '#/components/parameters/CreatedAtAfter'
        - $ref: '#/components/parameters/CreatedAtBefore'
      responses:
        '200':
          description: Список webhook-событий успешно получен.
          content:
