    ReferralLink:
      type: object
      description: >
        Реферальная ссылка магазина для партнёрской программы. При регистрации
        нового пользователя по ссылке он закрепляется за магазином-рефераром.
        Удаление выполняется программно (soft-delete: `is_deleted=true`).
      required:
        - id
        - shop
        - name
        - slug
        - page
        - default
        - visited_count
        - is_deleted
        - created_at
        - modified_at
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: Уникальный идентификатор реферальной ссылки.
          example: "03f8d13e-10ad-4b9a-9186-0f0ccfdf98a6"
        shop:
          type: string
          format: uuid
          readOnly: true
          description: ID магазина-владельца ссылки.
          example: "feff876c-aaa5-4c65-9483-75498deabe28"
        name:
          type: string
          maxLength: 50
          description: Название реферальной ссылки (для внутренней маркировки).
          example: "milad"
        slug:
          type: string
          maxLength: 200
          readOnly: true
          description: Уникальный slug ссылки. Используется в URL `/ref/<slug>/`.
          example: "03f8d13e-10ad-4b9a-9186-0f0ccfdf98a6"
        page:
          type: string
          enum:
            - WEBSITE
            - SOCIAL
            - OTHER
          description: Тип площадки размещения реферальной ссылки.
          example: "WEBSITE"
        default:
          type: boolean
          description: Флаг — является ли ссылка дефолтной для магазина.
          example: false
        visited_count:
          type: integer
          readOnly: true
          description: Количество переходов по ссылке.
          example: 0
        is_deleted:
          type: boolean
          readOnly: true
          description: Флаг мягкого удаления (soft-delete).
          example: false
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Дата и время создания ссылки.
          example: "2023-07-07T10:09:44.266Z"
        modified_at:
          type: string
          format: date-time
          readOnly: true
          description: Дата и время последнего обновления.
          example: "2023-07-07T10:09:44.267Z"
      example:
        id: "03f8d13e-10ad-4b9a-9186-0f0ccfdf98a6"
        shop: "feff876c-aaa5-4c65-9483-75498deabe28"
        name: "milad"
        slug: "03f8d13e-10ad-4b9a-9186-0f0ccfdf98a6"
        page: "WEBSITE"
        default: false
        visited_count: 0
        is_deleted: false
        created_at: "2023-07-07T10:09:44.266Z"
        modified_at: "2023-07-07T10:09:44.267Z"

