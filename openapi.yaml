    Payment:
      type: object
      required:
        - id
        - reference
        - currency
        - amount
        - received_amount
        - address
        - status
        - type
        - fixed_rate
        - fee_paid_by_user
        - commission_paid_by_user
        - created_at
        - modified_at
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: Уникальный идентификатор платежа (UUID transactionrequest).
          example: "9ada8297-5ac9-4810-a184-3de37f617677"
        shop:
          type: string
          format: uuid
          nullable: true
          description: ID магазина. Может отсутствовать в ответах PUBLIC API.
          example: "feff876c-aaa5-4c65-9483-75498deabe28"
        reference:
          type: string
          description: Короткий уникальный идентификатор платежа (10 символов).
          example: "183a633938"
        order_id:
          type: string
          nullable: true
          description: Внешний идентификатор заказа (задаётся мерчантом в инвойсе).
          example: null
        order_description:
          type: string
          nullable: true
          description: Описание заказа.
          example: null
        currency:
          type: string
          description: Код криптовалюты платежа (например USDTTRC20, ETH, BTC).
          example: "USDTTRC20"
        amount:
          $ref: '#/components/schemas/Money'
        received_amount:
          $ref: '#/components/schemas/Money'
        outcome_amount:
          $ref: '#/components/schemas/Money'
        address:
          type: string
          description: Адрес депозитного кошелька, на который клиент должен отправить средства.
          example: "TQrY8tryqsYVCYS3MFbtffiPp2ccyn4STm"
        status:
          type: string
          enum:
            - PENDING
            - CONFIRMING
            - COMPLETED
            - EXPIRED
            - UNDERPAID
            - OVERPAID
            - MULTIPLE
            - DELAYED
            - REJECTED
            - RESOLVED
          description: >
            Статус платежа.
            PENDING — ожидает оплаты;
            CONFIRMING — транзакция найдена, ждём подтверждений блокчейна;
            COMPLETED — платёж успешно подтверждён;
            EXPIRED — истёк таймаут ожидания;
            UNDERPAID — получена сумма меньше ожидаемой;
            OVERPAID — получена сумма больше ожидаемой;
            MULTIPLE — несколько транзакций на один адрес;
            DELAYED — задержка из-за низкого приоритета в сети;
            REJECTED — отклонён (KYT или вручную);
            RESOLVED — разрешён мерчантом вручную.
          example: "PENDING"
        type:
          type: string
          enum:
            - PAYMENT
            - INVOICE_PAYMENT
            - DONATION_PAYMENT
            - POS_PAYMENT
            - SUBSCRIBE_PAYMENT
          description: >
            Тип платежа в зависимости от источника:
            PAYMENT — прямой платёж через merchant API;
            INVOICE_PAYMENT — оплата инвойса;
            DONATION_PAYMENT — оплата по донат-ссылке;
            POS_PAYMENT — оплата по POS-ссылке;
            SUBSCRIBE_PAYMENT — периодический платёж по подписке.
          example: "INVOICE_PAYMENT"
        fixed_rate:
          type: boolean
          description: Был ли зафиксирован курс в момент создания платежа.
          example: true
        fee_paid_by_user:
          type: boolean
          description: Платит ли клиент сетевую комиссию поверх суммы.
          example: true
        commission_paid_by_user:
          type: boolean
          description: Платит ли клиент комиссию Zion поверх суммы.
          example: true
        rate:
          type: string
          nullable: true
          description: Курс обмена в момент создания платежа (если fixed_rate=true).
          example: null
        fee:
          $ref: '#/components/schemas/Money'
        commission:
          $ref: '#/components/schemas/Money'
        preliminary_model:
          type: string
          nullable: true
          enum:
            - INVOICE
            - DONATION_LINK
            - POS_LINK
            - SUBSCRIPTION
          description: Тип объекта, инициировавшего платёж.
          example: "INVOICE"
        preliminary_reference:
          type: string
          nullable: true
          description: Reference инвойса/донат-ссылки/подписки, к которой относится платёж.
          example: "e477b48c41"
        invoice_amount:
          $ref: '#/components/schemas/Money'
        deposit_hash:
          type: string
          nullable: true
          description: Хеш транзакции депозита в блокчейне (после подтверждения).
          example: null
        deposit_block_date:
          type: string
          format: date-time
          nullable: true
          description: Дата и время блока с депозитной транзакцией.
          example: null
        donation_name:
          type: string
          nullable: true
          description: Имя донатера (только для DONATION_PAYMENT).
          example: null
        donation_email:
          type: string
          nullable: true
          description: Email донатера (только для DONATION_PAYMENT).
          example: null
        donation_phone:
          type: string
          nullable: true
          description: Телефон донатера (только для DONATION_PAYMENT).
          example: null
        donation_social_link:
          type: string
          nullable: true
          description: Ссылка на соцсеть донатера (только для DONATION_PAYMENT).
          example: null
        cancel_url:
