          example: "USDTTRC20"
        address:
          type: string
          description: Адрес кошелька получателя.
          example: "TPxCtFo4A1cSZ6bmg59Dvc2tZPFVFa5QyV"
        moderated_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Дата и время модерации кошелька саппортом.
