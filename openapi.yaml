    Conversion:
      type: object
      description: >
        Запись о конвертации между двумя криптовалютами. Наследует базовые
        поля от `TransactionRequest` (id, currency, amount, fee, reference,
        created_at, modified_at). Тип `CONVERT` — автоматическая конвертация
        через биржу; `MANUAL_CONVERT` — конвертация, требующая одобрения
        саппорта.
      required:
        - id
        - shop
        - currency
        - amount
        - fee
        - destination_currency
        - converted_amount
        - type
        - status
        - converted
        - created_at
        - modified_at
      properties:
        id:
          type: string
          format: uuid
          description: Уникальный идентификатор конвертации.
          example: "3d9d20ad-b021-4aad-bf45-63dd5f4ed659"
        shop:
          type: string
          format: uuid
          description: ID магазина.
          example: "feff876c-aaa5-4c65-9483-75498deabe28"
        reference:
          type: string
          nullable: true
          description: Внутренний референс операции.
          example: "conv_001"
        currency:
          type: string
          description: Код исходной криптовалюты (из какой конвертируем).
          example: "USDTTRC20"
        amount:
          $ref: '#/components/schemas/Money'
        fee:
          $ref: '#/components/schemas/Money'
        destination_currency:
          type: string
          description: Код целевой криптовалюты (в какую конвертируем).
          example: "USDTERC20"
        converted_amount:
          $ref: '#/components/schemas/Money'
        type:
          type: string
          enum:
            - CONVERT
            - MANUAL_CONVERT
          description: >
            Тип конвертации: `CONVERT` — автоматическая через биржу;
            `MANUAL_CONVERT` — требует одобрения саппорта перед исполнением.
          example: "CONVERT"
        status:
          type: string
          enum:
            - PENDING
            - APPROVING
            - COMPLETED
            - FAILED
            - DISAPPROVED
          description: >
            Статус конвертации: `PENDING` — ожидает обработки; `APPROVING` —
            на проверке у саппорта (только `MANUAL_CONVERT`); `COMPLETED` —
            успешно завершена; `FAILED` — ошибка при обработке;
            `DISAPPROVED` — отклонена саппортом.
          example: "COMPLETED"
        converted:
          type: boolean
          description: Флаг — была ли биржевая конвертация фактически исполнена.
          example: true
        approved_at:
          type: string
          format: date-time
          nullable: true
          description: Дата и время одобрения (для `MANUAL_CONVERT`).
          example: "2023-10-02T01:19:55.471Z"
        failed_at:
          type: string
          format: date-time
          nullable: true
          description: Дата и время неудачной попытки обработки.
          example: null
        disapproved_at:
          type: string
          format: date-time
          nullable: true
          description: Дата и время отклонения конвертации.
          example: null
        created_at:
          type: string
          format: date-time
          description: Дата и время создания.
          example: "2023-10-01T22:00:00.000Z"
        modified_at:
          type: string
          format: date-time
          description: Дата и время последнего обновления.
          example: "2023-10-02T01:19:55.471Z"
      example:
        id: "3d9d20ad-b021-4aad-bf45-63dd5f4ed659"
        shop: "feff876c-aaa5-4c65-9483-75498deabe28"
        reference: "conv_001"
