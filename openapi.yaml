        - $ref: '#/components/parameters/CreatedAtAfter'
        - $ref: '#/components/parameters/CreatedAtBefore'
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - PENDING
              - APPROVING
              - CONFIRMING
              - COMPLETED
              - FAILED
              - DISAPPROVED
          description: Фильтр по статусу вывода.
      responses:
        '200':
          description: Список выводов успешно получен.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedWithdrawals'
              example:
                count: 1
                next: null
                previous: null
                results:
                  - id: "b8a6b808-6826-48d1-911a-e1c2bbe27912"
                    shop: "feff876c-aaa5-4c65-9483-75498deabe28"
                    reference: "wd_a1b2c3d4e5"
                    currency: "USDTTRC20"
                    amount: "100.000000"
                    fee: "2.000000"
                    address: "TRKxd8cZugoMpDyLjnFrafoHz2j4mGUgo2"
